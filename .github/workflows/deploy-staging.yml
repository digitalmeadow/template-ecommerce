name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.2.1

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          PREVIEW: false
          CLOUDFLARE_ENV: staging

          WEBSITE_URL: https://template-ecommerce-staging.digital-meadow.workers.dev

          SANITY_DATASET: production
          SANITY_VIEWER_API_TOKEN: ${{ secrets.SANITY_VIEWER_API_TOKEN }}
          SANITY_EDITOR_API_TOKEN: ${{ secrets.SANITY_EDITOR_API_TOKEN }}
          SANITY_WEBHOOK_SECRET: ${{ secrets.SANITY_WEBHOOK_SECRET }}

          GIT_API_TOKEN: ${{ secrets.GIT_API_TOKEN }}
          GIT_WORKFLOW_ID_DEPLOY: deploy-staging.yml
          GIT_BRANCH: staging

          SHOPIFY_PRIVATE_API_TOKEN: ${{ secrets.SHOPIFY_PRIVATE_API_TOKEN }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: frontend
          environment: staging
