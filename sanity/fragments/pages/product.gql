fragment ProductThumbnail on Product {
  __typename
  _id

  mediaThumbnail {
    ...Media
  }

  shopify {
    title
    handle {
      ...Slug
    }
    status
  }
}

fragment Product on Product {
  __typename
  _id

  mediaThumbnail {
    ...Media
  }

  mediaGallery {
    ...Media
  }

  accordions {
    ...Accordion
  }

  meta {
    ...Meta
  }

  shopify {
    title
    handle {
      ...Slug
    }
    status
  }
}
